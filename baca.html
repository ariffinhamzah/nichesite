<!DOCTYPE html>
<html lang="ms">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Artikel panduan faham Al-Quran dengan teknik Think Quran. 15 minit sehari sudah cukup.">
    <meta name="theme-color" content="#4B0E86">
    <meta property="og:type" content="article">
    <meta property="og:locale" content="ms_MY">
    <meta property="og:site_name" content="Think Quran Fan">
    <meta name="twitter:card" content="summary_large_image">
    <link rel="canonical" href="https://bacalah.linkjer.my/baca.html">
    <link rel="preconnect" href="https://cdn.jsdelivr.net">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap">
    <link rel="stylesheet" href="dist/tailwind.min.css" integrity="sha384-B3je6fPUlU+6SNSShUSI986ba9SeKmykdfsDopCB6lEEj8ilwX29P0mYN1Bqr81o" crossorigin="anonymous">
    <link rel="stylesheet" href="dist/site.css">
    <title>Artikel - Think Quran</title>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.6/dist/purify.min.js" integrity="sha384-cwS6YdhLI7XS60eoDiC+egV0qHp8zI+Cms46R0nbn8JrmoAzV9uFL60etMZhAnSu" crossorigin="anonymous" defer></script>
</head>

<body class="bg-brand-surface text-slate-800 pb-24">

    <nav class="bg-white shadow-sm sticky top-0 z-50 border-b border-gray-100">
        <div class="max-w-2xl mx-auto px-4 py-4">
            <a href="index.html" class="flex items-center text-slate-500 hover:text-brand-purple font-medium transition">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-1" fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
                </svg>
                Kembali ke Home
            </a>
        </div>
    </nav>

    <article class="max-w-2xl mx-auto px-4 py-8 bg-white min-h-screen shadow-sm mt-4 rounded-lg border border-gray-100">
        <span id="post-date" class="text-xs font-bold text-brand-yellow uppercase tracking-wider"></span>
        <h1 id="post-title" class="text-3xl md:text-4xl font-extrabold text-brand-purple mt-2 mb-8 leading-tight"><noscript>Sila enable JavaScript untuk paparkan artikel.</noscript></h1>

        <div
            class="bg-gradient-to-r from-brand-purple to-brand-purpleMid rounded-xl p-6 mb-10 text-white relative overflow-hidden shadow-lg">
            <div class="relative z-10 flex flex-col md:flex-row items-center justify-between gap-4">
                <div class="text-center md:text-left">
                    <p class="font-bold text-lg text-brand-yellow">Nak faham Quran cepat?</p>
                    <p class="text-sm text-indigo-100 opacity-90">Guna teknik ThinkQuran. 15 Minit sehari je.</p>
                </div>
                <button onclick="goAffiliate()"
                    class="bg-brand-yellow text-brand-purple text-sm font-bold px-6 py-3 rounded-lg shadow hover:bg-white hover:text-brand-purple transition transform hover:-translate-y-1 w-full md:w-auto">Cuba
                    App Sekarang</button>
            </div>
        </div>

        <div id="post-content" class="article-body"></div>
        <div id="post-error" class="hidden p-10 text-center">
            <p class="text-slate-600 mb-4">Artikel tak jumpa.</p>
            <a href="index.html" class="text-blue-500 underline">Balik Home</a>
        </div>

        <div class="mt-16 pt-8 border-t border-gray-100 text-center">
            <p class="font-bold mb-4 text-slate-600">Serius nak belajar?</p>
            <button onclick="goAffiliate()"
                class="w-full bg-brand-yellow text-brand-purple font-extrabold py-4 rounded-xl shadow-lg hover:bg-yellow-400 transition text-lg border-b-4 border-yellow-600 active:border-b-0 active:translate-y-1">Daftar
                Think Quran Percuma</button>
        </div>
    </article>

    <div
        class="fixed bottom-0 left-0 w-full bg-white border-t border-gray-200 p-4 md:hidden shadow-[0_-5px_10px_rgba(0,0,0,0.05)] z-40">
        <button onclick="goAffiliate()"
            class="w-full bg-brand-purple text-white font-bold py-3.5 rounded-lg shadow-md hover:bg-brand-purple-dark">Dapatkan
            Akses Percuma Sekarang</button>
    </div>

    <div id="admin-secret-btn" class="hidden text-center mt-4 mb-10">
        <button onclick="editArticle()" class="text-xs text-red-600 font-bold border border-red-200 bg-red-50 px-6 py-2 rounded-full shadow-sm hover:bg-red-100 transition flex items-center justify-center mx-auto gap-2">
            <span>🔒</span> EDIT ARTIKEL INI (ADMIN)
        </button>
    </div>

    <script>
        // VARIABLE GLOBAL
        var currentArticleData = null;

        // Auto-Update Script
        var script = document.createElement('script');
        script.src = 'db.js?v=' + new Date().getTime(); 

        script.onerror = () => {
            document.getElementById('post-error').classList.remove('hidden');
        };

        script.onload = function() {
            const params = new URLSearchParams(window.location.search);
            const currentSlug = params.get('slug');

            currentArticleData = articles.find(a => a.slug === currentSlug);

            if (currentArticleData) {
                document.title = currentArticleData.title + " - " + SITE_CONFIG.name;
                document.getElementById('post-title').innerText = currentArticleData.title;
                document.getElementById('post-date').innerText = currentArticleData.date;
                document.getElementById('post-content').innerHTML = DOMPurify.sanitize(currentArticleData.content || '');
                document.querySelectorAll('#post-content img').forEach(img => {
                    if (!img.hasAttribute('loading')) img.setAttribute('loading', 'lazy');
                    if (!img.hasAttribute('decoding')) img.setAttribute('decoding', 'async');
                });
            } else {
                document.getElementById('post-content').classList.add('hidden');
                document.getElementById('post-error').classList.remove('hidden');
            }
        };

        document.head.appendChild(script);

        function goAffiliate() {
            if (typeof SITE_CONFIG !== 'undefined' && SITE_CONFIG.affiliateLink) {
                window.open(SITE_CONFIG.affiliateLink, '_blank', 'noopener,noreferrer');
            } else {
                alert("Sabar jap, tengah loading...");
            }
        }

        function editArticle() {
            if (!currentArticleData) {
                alert("Artikel belum ready!");
                return;
            }
            try {
                localStorage.setItem('editData', JSON.stringify(currentArticleData));
            } catch (e) { alert("Storage error: " + e.message); return; }
            window.open('admin.html', '_blank', 'noopener,noreferrer');
        }
    </script>
</body>

</html>
