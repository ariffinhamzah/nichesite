<!DOCTYPE html>
<html lang="ms">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <meta name="referrer" content="no-referrer">
    <meta name="theme-color" content="#4B0E86">
    <link rel="preconnect" href="https://cdn.jsdelivr.net">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap">
    <link rel="stylesheet" href="dist/tailwind.min.css" integrity="sha384-7sE5nI0qVfzlgTGoiQYi6JcCzM+CGaHs1ztFzSIzsbjGtquEgJRCxBC2xXQoZq9F" crossorigin="anonymous">
    <link rel="stylesheet" href="dist/site.css">
    <title>Admin Panel - Think Quran</title>
    <link href="https://cdn.jsdelivr.net/npm/quill@1.3.7/dist/quill.snow.css" rel="stylesheet" integrity="sha384-cPa8kzsYWhqpAfWOLWYIw3V0BhPi/m3lrd8tBTPxr2NrYCHRVZ7xy1cEoRGOM/03" crossorigin="anonymous">
</head>

<body class="bg-slate-100 min-h-screen pb-20">

    <header class="bg-brand-purple text-white py-3 px-6 shadow-md sticky top-0 z-50">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <h1 class="text-lg font-bold flex items-center gap-2">
                Admin Panel <span class="bg-indigo-500 text-white text-[10px] px-2 py-0.5 rounded-full font-extrabold">V9 (Format Pro)</span>
            </h1>
            <div class="flex gap-4 text-xs items-center">
                <span id="saveStatus" class="text-green-300 hidden transition-opacity duration-500">💾 Auto-saved</span>
                <button onclick="window.location.reload()" class="hover:text-red-300 opacity-70">Reset</button>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto mt-6 px-4 flex gap-6 flex-col lg:flex-row">

        <div class="flex-1 space-y-4">
            <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-200">
                 <details>
                    <summary class="font-bold text-gray-700 cursor-pointer text-xs uppercase tracking-wide flex items-center gap-2">
                        📥 Import Manual
                    </summary>
                    <div class="mt-3 flex gap-2">
                        <textarea id="importText" rows="1" class="w-full border border-gray-300 rounded p-2 text-xs font-mono outline-none focus:border-[#4B0E86]" placeholder="Paste object { ... } dari db.js"></textarea>
                        <button onclick="loadFromCode()" class="bg-orange-500 text-white font-bold px-4 text-xs rounded hover:bg-orange-600 whitespace-nowrap shadow">LOAD</button>
                    </div>
                </details>
            </div>

            <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200">
                <div class="space-y-4">
                    <div>
                        <label for="title" class="text-xs font-bold text-gray-500 uppercase">Tajuk Artikel</label>
                        <input type="text" id="title" oninput="handleTitleChange()" class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:ring-1 focus:ring-brand-purple outline-none font-bold text-lg text-brand-purple" aria-required="true">
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label for="slug" class="text-xs font-bold text-gray-500 uppercase">Slug (URL)</label>
                            <input type="text" id="slug" class="w-full bg-gray-50 border border-gray-300 rounded-lg px-3 py-2 text-xs text-gray-500" readonly aria-readonly="true">
                        </div>
                        <div>
                            <label for="date" class="text-xs font-bold text-gray-500 uppercase">Tarikh</label>
                            <input type="text" id="date" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm" placeholder="cth: 15 Dis 2025">
                        </div>
                    </div>
                    <div>
                        <label for="desc" class="text-xs font-bold text-gray-500 uppercase">Deskripsi Pendek</label>
                        <textarea id="desc" rows="2" oninput="handleDescChange()" class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:ring-1 focus:ring-[#4B0E86] outline-none text-sm"></textarea>
                    </div>
                    <div>
                        <div class="flex justify-between items-end mb-1">
                            <label for="editor-container" class="text-xs font-bold text-gray-500 uppercase">Isi Kandungan</label>
                            <button type="button" onclick="toggleHtmlMode()" id="btnToggleHtml" class="text-[10px] font-mono bg-slate-100 text-slate-500 px-2 py-1 rounded border border-slate-300 hover:bg-slate-200 transition" aria-pressed="false">
                                &lt;/&gt; Edit Source
                            </button>
                        </div>
                        <div id="editor-wrapper">
                            <div id="editor-container" class="h-[450px] bg-white rounded-b-lg font-inter" role="textbox" aria-multiline="true" aria-label="Editor kandungan artikel"></div>
                        </div>
                        <textarea id="html-editor" spellcheck="false" oninput="updatePreview()" aria-label="Editor HTML sumber"></textarea>
                    </div>
                </div>
            </div>
        </div>

        <div class="hidden lg:block w-[350px] shrink-0">
            <div class="sticky top-20">
                <h3 class="text-center text-[10px] font-bold text-gray-400 uppercase mb-3 tracking-widest">Mobile Preview</h3>
                <div class="phone-mockup">
                    <div class="absolute top-0 left-1/2 -translate-x-1/2 w-32 h-6 bg-slate-800 rounded-b-xl z-20"></div>
                    <div class="phone-screen">
                        <div class="mt-4 mb-6">
                            <span id="preview-date" class="text-[10px] font-bold text-brand-yellow uppercase tracking-wider block mb-1">DATE</span>
                            <h1 id="preview-title" class="text-2xl font-extrabold text-brand-purple leading-tight">Tajuk Artikel...</h1>
                        </div>
                        <div id="preview-content" class="mobile-preview">
                            <p class="text-gray-400 italic text-center mt-10">Mula menaip...</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="w-full lg:w-1/4">
            <div class="bg-slate-800 p-5 rounded-xl shadow-lg sticky top-20 border border-slate-700">
                <button onclick="generateJSON()" class="w-full bg-brand-yellow text-brand-purple font-extrabold py-3 rounded-lg shadow hover:bg-yellow-400 mb-4 text-sm animate-pulse">
                    ⚡ GENERATE CODE
                </button>
                <h2 class="font-bold text-white text-[10px] uppercase tracking-wider mb-2">Hasil Code (JSON)</h2>
                <textarea id="output" class="w-full h-80 bg-slate-900 text-green-400 font-mono text-[10px] p-3 rounded border border-slate-700 focus:outline-none" readonly onclick="this.select()"></textarea>
                <button onclick="copyToClipboard()" id="copyBtn" class="w-full mt-3 bg-white/10 text-white border border-white/20 py-2.5 rounded hover:bg-white/20 text-xs font-semibold">Copy Code</button>
            </div>
        </div>

    </main>

    <script src="https://cdn.jsdelivr.net/npm/quill@1.3.7/dist/quill.min.js" integrity="sha384-QUJ+ckWz1M+a7w0UfG1sEn4pPrbQwSxGm/1TIPyioqXBrwuT9l4f9gdHWLDLbVWI" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.6/dist/purify.min.js" integrity="sha384-cwS6YdhLI7XS60eoDiC+egV0qHp8zI+Cms46R0nbn8JrmoAzV9uFL60etMZhAnSu" crossorigin="anonymous"></script>
    <script>
        const QUILL_SAFE_CONFIG = { ADD_ATTR: ['target'], ALLOWED_URI_REGEXP: /^(?:(?:https?|mailto):|[^a-z]|[a-z+.-]+(?:[^a-z+.\-:]|$))/i };
        const sanitizeHTML = (html) => DOMPurify.sanitize(html || '', QUILL_SAFE_CONFIG);

        // --- 1. SETUP EDITOR ---
        const quill = new Quill('#editor-container', {
            theme: 'snow',
            modules: {
                toolbar: [
                    [{ 'header': [1, 2, 3, false] }], // Tambah H1
                    ['bold', 'italic', 'underline', 'strike'],
                    [{ 'align': [] }], // <--- INI DIA: ALIGNMENT (Kiri, Tengah, Kanan, Justify)
                    [{ 'list': 'ordered' }, { 'list': 'bullet' }],
                    ['blockquote', 'code-block'],
                    ['link', 'image', 'video'],
                    ['clean']
                ]
            }
        });

        // Image URL Handler
        const toolbar = quill.getModule('toolbar');
        toolbar.addHandler('image', function() {
            const url = prompt('Masukkan URL Gambar:');
            if (!url) return;
            if (!/^https?:\/\//i.test(url)) {
                alert('URL mesti bermula dengan http:// atau https://');
                return;
            }
            const range = quill.getSelection();
            quill.insertEmbed(range.index, 'image', url);
        });

        // --- 2. LOGIC EDITOR (SAMA MACAM V8) ---
        let isHtmlMode = false;
        
        function toggleHtmlMode() {
            const wrapper = document.getElementById('editor-wrapper');
            const htmlEd = document.getElementById('html-editor');
            const btn = document.getElementById('btnToggleHtml');

            if (!isHtmlMode) {
                htmlEd.value = sanitizeHTML(quill.root.innerHTML);
                wrapper.style.display = 'none';
                htmlEd.style.display = 'block';
                btn.innerText = "👁️ Visual Mode";
                btn.className = "text-[10px] font-mono bg-blue-100 text-blue-600 px-2 py-1 rounded border border-blue-300 hover:bg-blue-200 transition";
                isHtmlMode = true;
            } else {
                quill.clipboard.dangerouslyPasteHTML(htmlEd.value);
                htmlEd.style.display = 'none';
                wrapper.style.display = 'block';
                btn.innerText = "</> Edit Source";
                btn.className = "text-[10px] font-mono bg-slate-100 text-slate-500 px-2 py-1 rounded border border-slate-300 hover:bg-slate-200 transition";
                isHtmlMode = false;
            }
            updatePreview();
        }

        function updatePreview() {
            const title = document.getElementById('title').value;
            const desc = document.getElementById('desc').value;
            const date = document.getElementById('date').value;
            const content = isHtmlMode ? document.getElementById('html-editor').value : quill.root.innerHTML;
            document.getElementById('preview-title').innerText = title || 'Tajuk Artikel';
            document.getElementById('preview-desc').innerText = desc || 'Deskripsi pendek...';
            document.getElementById('preview-date').innerText = date;
            document.getElementById('preview-content').innerHTML = sanitizeHTML(content);
        }

        let saveDraftTimer = null;
        function saveDraft() {
            clearTimeout(saveDraftTimer);
            saveDraftTimer = setTimeout(() => {
                try {
                    const draft = {
                        title: document.getElementById('title').value,
                        slug: document.getElementById('slug').value,
                        date: document.getElementById('date').value,
                        desc: document.getElementById('desc').value,
                        content: isHtmlMode ? document.getElementById('html-editor').value : quill.root.innerHTML
                    };
                    localStorage.setItem('adminDraft', JSON.stringify(draft));
                    const status = document.getElementById('saveStatus');
                    status.classList.remove('hidden');
                    clearTimeout(saveDraft._t);
                    saveDraft._t = setTimeout(() => status.classList.add('hidden'), 1000);
                } catch (e) { console.error('saveDraft failed:', e); }
            }, 400);
        }

        window.addEventListener('DOMContentLoaded', () => {
            try {
                const editData = localStorage.getItem('editData');
                if (editData) {
                    const obj = JSON.parse(editData);
                    if (obj && typeof obj === 'object') {
                        populateForm(obj);
                        setTimeout(() => alert("✏️ Mode Edit Aktif"), 500);
                    }
                    localStorage.removeItem('editData');
                } else {
                    const draft = localStorage.getItem('adminDraft');
                    if (draft) {
                        try { populateForm(JSON.parse(draft)); } catch (e) { localStorage.removeItem('adminDraft'); }
                    }
                }
            } catch (e) { console.error('loadDraft failed:', e); }
        });

        function populateForm(obj) {
            document.getElementById('title').value = obj.title || '';
            generateSlug();
            if (obj.date) {
                document.getElementById('date').value = obj.date;
            }
            document.getElementById('desc').value = obj.desc || '';
            if (obj.content) {
                const clean = sanitizeHTML(obj.content);
                quill.clipboard.dangerouslyPasteHTML(clean);
                if (isHtmlMode) document.getElementById('html-editor').value = clean;
            }
            updatePreview();
        }

        const DEFAULT_DATE = () => new Date().toLocaleDateString('ms-MY', { day: 'numeric', month: 'short', year: 'numeric' });
        const dateInput = document.getElementById('date');
        if (!dateInput.value) dateInput.value = DEFAULT_DATE();

        function generateSlug() {
            const title = document.getElementById('title').value;
            const slug = title.toLowerCase().replace(/[^\w\s-]/g, '').replace(/\s+/g, '-').replace(/-+/g, '-').replace(/^-+|-+$/g, '');
            document.getElementById('slug').value = slug;
        }

        function handleTitleChange() { generateSlug(); updatePreview(); saveDraft(); }
        function handleDescChange() { updatePreview(); saveDraft(); }

        function loadFromCode() {
            let input = document.getElementById('importText').value.trim();
            if (input.endsWith(',')) input = input.slice(0, -1);
            try {
                const obj = JSON.parse(input);
                if (!obj || typeof obj !== 'object') throw new Error('Input bukan object JSON yang sah');
                populateForm(obj);
                alert("✅ Berjaya import!");
            } catch (e) { alert("Error: " + e.message); }
        }

        function generateJSON() {
            const title = document.getElementById('title').value;
            const slug = document.getElementById('slug').value;
            const date = document.getElementById('date').value;
            const desc = document.getElementById('desc').value;
            let content = isHtmlMode ? document.getElementById('html-editor').value : quill.root.innerHTML;
            content = sanitizeHTML(content);
            if (!title) return alert("Tajuk kosong bang!");
            const obj = {
                slug: slug,
                title: title,
                desc: desc,
                date: date,
                content: content
            };
            const outputString = '    ' + JSON.stringify(obj, null, 4).replace(/\n/g, '\n    ') + ',';
            document.getElementById('output').value = outputString;
        }

        function copyToClipboard() {
            const copyText = document.getElementById("output");
            if (!copyText.value) return;
            copyText.select();
            if (navigator.clipboard && window.isSecureContext) {
                navigator.clipboard.writeText(copyText.value).then(() => {
                    document.getElementById("copyBtn").innerText = "✅ Dah Copy!";
                }).catch(() => fallbackCopy(copyText));
            } else {
                fallbackCopy(copyText);
            }
            setTimeout(() => { document.getElementById("copyBtn").innerText = "Copy Code"; }, 2000);
        }

        function fallbackCopy(el) {
            try { document.execCommand("copy"); } catch (e) { console.error('Copy failed:', e); }
        }
        
        let previewTimer = null;
        quill.on('text-change', () => {
            clearTimeout(previewTimer);
            previewTimer = setTimeout(() => { updatePreview(); saveDraft(); }, 300);
        });
    </script>
</body>
</html>
